appId: zhizhi.cardscpoe
---

# ────────────────────────────────────────────
#  Onboarding — Skip Flow
# ────────────────────────────────────────────

- launchApp:
    clearState: true

- assertVisible: "Continue"
- tapOn: "Skip"

# Skip on Step 1 jumps directly to Paywall
- assertVisible:
    text: "Unlock CardScope Pro"
    optional: true

# Scroll down to CTA and tap
- scrollUntilVisible:
    element: "Start 3-Day Free Trial"
    direction: DOWN
    timeout: 5000
- tapOn: "Start 3-Day Free Trial"

- assertVisible: "Home"
